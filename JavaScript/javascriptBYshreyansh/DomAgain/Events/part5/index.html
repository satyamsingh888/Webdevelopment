<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Now Display";

        }
        html,body{
            width:100%;
            height: 100%;
            background-color: #000000;
            color: azure;
        }
        body{
            overflow: hidden;
            position: relative;
        }
        #xyz{
            position: absolute;
            transition: all cubic-bezier(0.19, 1, 0.22, 1) 0.2;
            width : 400px;
            height: 400px;
            background-color: #e20d0d;
        }
    </style>
</head>
<body>
    <div id="xyz">

    </div>
    <script src="script.js"></script>
</body>
</html>
