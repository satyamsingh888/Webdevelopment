<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Now Display";

        }
        html,body{
            width:100%;
            height: 100%;
            background-color: #000000;
            
          
            
            
           
        }
         #main{
           padding: 30px;
            height: 100%;
            
           
           
        }
        input{
        
            background-color: #2e2828;
            color: rgb(2, 168, 93);
            display: block;
          
        }
        .card{
            max-width:300px ;
            display: inline-block;
            padding: 20px;
            border: 1px solid #555;
            border-radius: 5px;
          color: azure;
          background-color: #2e04c3;
        }
        .profile{
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 50%;
            margin-bottom: 10px;
            overflow: hidden;
        
        }
        .profile img{
           width: 100%; 
           height: 100%;
           object-fit: cover;
        }
        .card h5{
            margin-top:5px ;
            
        }
        .card p{
            font-size: 12px;
            margin-top: 20px;
        }
        
    </style>
</head>
<body>
    <div id="main">
        
        <form action="">
            <input type="text" placeholder="profile pic">
         <input type="text" placeholder="name">
         <input type="text" placeholder="occupation">
         <input type="text" placeholder="info">
         <input type="submit">
        </form>
       
    </div>

    <script src="script.js"></script>
</body>
</html>
