<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Now Display";

        }
        html,body{
            width:100%;
            height: 100%;
        }
        #main{
            width: 100%;
            background-color:#222;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: grey;
           
        }
        input{
            display: none;
        }
        #btn{
            padding: 12px 22px;
            background-color: red;
            color: black;
            border-radius: 5px;
            font-weight: bold;
        }
        #btn:hover{
            background-color:rgb(91, 2, 2);
        }
    </style>
</head>
<body>
    <div id="main">
        
        <input  id="fileinp" type="file">
        <div id="btn">
            Upload File
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
