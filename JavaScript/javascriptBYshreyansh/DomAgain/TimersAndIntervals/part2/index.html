<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Download Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Download File</h2>

  <!-- Progress Bar -->
  <div class="progress-box">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- Percentage -->
  <p id="percentage">0%</p>

  <!-- Status -->
  <p id="status">Click start to download</p>

  <!-- Button -->
  <button id="startBtn">Start Download</button>
</div>

<script src="script.js"></script>
</body>
</html>
